name: Maya APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Sürüm Numarasını Oku
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build APK
        working-directory: .
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      - name: Sign APK
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/apksigner sign \
            --ks release.keystore \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release-unsigned.apk Maya.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Maya
          path: Maya.apk

      - name: Release Oluştur
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Maya v${{ steps.version.outputs.version }}"
          files: Maya.apk
          body: |
            APK'yı indirmek için aşağıdaki `Maya.apk` dosyasına tıklayın.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
